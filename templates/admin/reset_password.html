{% extends "admin/base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}

<div class="page-header">
  <h1>🔑 Reset Password</h1>
  <p>Set a new password for <strong>{{ target_user.full_name }}</strong> ({{ target_user.username }})</p>
</div>

<div class="card" style="max-width:440px">
  <form method="POST" action="{{ url_for('admin_reset_password', user_id=target_user.id) }}">
    <div class="form-group">
      <label>New Password <span style="color:var(--color-red)">*</span></label>
      <input type="password" name="new_password" required minlength="8"
             placeholder="Min 8 characters">
    </div>
    <div class="form-group" style="margin-top:12px">
      <label>Confirm New Password <span style="color:var(--color-red)">*</span></label>
      <input type="password" name="confirm_password" required minlength="8"
             placeholder="Repeat password">
    </div>
    <div class="form-group" style="margin-top:12px">
      <label>Force password change on next login?</label>
      <select name="must_change">
        <option value="1" selected>Yes (recommended)</option>
        <option value="0">No</option>
      </select>
    </div>
    <div class="btn-group" style="margin-top:20px">
      <button type="submit" class="btn btn-primary">💾 Reset Password</button>
      <a href="{{ url_for('admin_edit_user', user_id=target_user.id) }}"
         class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
