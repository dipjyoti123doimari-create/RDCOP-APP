{% extends "base_launcher.html" %}
{% block title %}{{ module_name }} — Coming Soon{% endblock %}
{% block content %}

<div style="text-align:center; max-width:520px; margin:0 auto">
  <div style="font-size:64px; margin-bottom:20px">🚧</div>
  <div class="module-name" style="font-size:36px; margin-bottom:12px">{{ module_name }}</div>
  <div class="module-desc" style="font-size:16px; margin-bottom:8px; color:var(--text)">{{ module_desc }}</div>
  <p style="color:var(--text-faint); font-size:14px; margin-bottom:32px">
    This module is under development. Check back soon.
  </p>
  <a href="{{ url_for('page_home') }}" class="module-launch active" style="display:inline-flex">
    ← Back to Module Launcher
  </a>
</div>

{% endblock %}
